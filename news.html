<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/server_logo.png" type="image/png">
    <link rel="apple-touch-icon" href="images/server_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <title>新井鯖 - News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        /* ── Navigation ── */
        .site-nav {
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            position: sticky;
            font-family: 'Noto Sans JP', sans-serif;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 2rem;
        }
        .nav-logo-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: #f1f5f9;
        }
        .nav-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }
        .nav-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: #38bdf8;
            letter-spacing: 0.02em;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 0.25rem;
        }
        .nav-links a {
            display: block;
            padding: 0.5rem 1rem;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: #1e293b;
            color: #38bdf8;
            border-color: #334155;
        }
        .nav-links a.active {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        /* ── Container ── */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem 0;
        }

        /* ── Page Header ── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #334155;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        /* ── Search ── */
        .search-box {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            flex: 1;
            min-width: 220px;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
        }
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .filter-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .filter-btn.active {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.3);
        }

        /* ── News Cards ── */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 4rem;
        }
        .news-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .news-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #334155;
            transition: background 0.2s;
        }
        .news-card:hover {
            border-color: #38bdf8;
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1);
        }
        .news-card:hover::before {
            background: #38bdf8;
        }
        .news-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .news-date {
            font-size: 0.8rem;
            color: #64748b;
            font-family: 'Courier New', monospace;
        }
        .news-tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.65rem;
            border-radius: 4px;
            display: inline-block;
        }
        .tag-info    { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .tag-event   { background: rgba(234, 179, 8, 0.15);  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
        .tag-update  { background: rgba(34, 197, 94, 0.15);  color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .tag-maintenance { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .news-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }
        .news-body-preview {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-body-full {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.8;
            border-top: 0 solid #334155;
            margin-top: 0;
            white-space: pre-wrap;
        }
        .news-card.open .news-body-preview {
            display: none;
        }
        .news-card.open .news-body-full {
            max-height: 600px;
            padding-top: 0.75rem;
            margin-top: 0.75rem;
            border-top-width: 1px;
        }
        .news-card.open {
            border-color: #38bdf8;
        }
        .news-card.open::before {
            background: #38bdf8;
        }

        /* 検索結果なし */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 2.5rem 2rem 2rem;
            color: #475569;
            font-size: 0.8rem;
            border-top: 1px solid #1e293b;
            margin-top: 4rem;
        }
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .footer-social a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.45rem 1rem;
            border-radius: 20px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .footer-social a:hover {
            color: #f1f5f9;
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.08);
        }
        .footer-social img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            transform: scale(1.05);
        }
        .footer-social a[href*="x.com"] img {
            transform: scale(0.88);
        }
        footer p {
            margin-bottom: 0.25rem;
        }

        /* ── Hamburger ── */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }
        .nav-hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #f1f5f9;
            border-radius: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .container { padding: 2rem 1rem 0; }
            h1 { font-size: 2rem; }
            .nav-inner { padding: 0.75rem 1rem; position: relative; }
            .news-card { padding: 1.25rem 1.25rem 1.25rem 1.5rem; }
            .search-box { flex-direction: column; }
            .search-input { width: 100%; }
            .nav-hamburger { display: flex; }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: rgba(15, 23, 42, 0.97);
                border-bottom: 1px solid #334155;
                padding: 0.5rem 1rem 1rem;
                z-index: 99;
            }
            .nav-links.open { display: flex; }
        }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo-link">
                <img src="images/server_logo.png" alt="新井鯖ロゴ" class="nav-logo">
                <span class="nav-title">新井鯖</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="news.html" class="active">News</a></li>
                <li><a href="members.html">Members</a></li>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
            <button class="nav-hamburger" onclick="toggleNav()" aria-label="メニューを開く">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>News</h1>
            <p class="subtitle">新井鯖からのお知らせ</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="タイトル・内容で検索...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="info">お知らせ</button>
                <button class="filter-btn" data-filter="event">イベント</button>
                <button class="filter-btn" data-filter="update">アップデート</button>
                <button class="filter-btn" data-filter="maintenance">メンテナンス</button>
            </div>
        </div>

        <div class="news-list" id="newsList"></div>
    </div>

    <footer>
        <div class="footer-social">
            <a href="https://line.me/ti/g2/uViXaSuCHoFWX0Z8WiyY2io4IRrXuT6t4OhRZA" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn.simpleicons.org/line/94a3b8" alt="LINE"> LINE</a>
            <a href="https://discord.gg/EWphkMNb5h" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn.simpleicons.org/discord/94a3b8" alt="Discord"> Discord</a>
            <a href="https://www.youtube.com/@arai_server" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn.simpleicons.org/youtube/94a3b8" alt="YouTube"> YouTube</a>
            <a href="https://x.com/913_arakuma" target="_blank" rel="noopener noreferrer">
                <img src="https://cdn.simpleicons.org/x/94a3b8" alt="X"> X</a>
            <a href="https://github.com/kokopscraft/arai-server-members" target="_blank" rel="noopener">
                <img src="https://cdn.simpleicons.org/github/94a3b8" alt="GitHub"> GitHub</a>
        </div>
        <p>&copy; 2026 arai server. All rights reserved.</p>
        <p>無断転載・二次配布を禁じます。</p>
    </footer>

    <script>
        // ============================================================
        // お知らせデータ
        // 新しい記事を追加する場合は、newsData 配列の先頭に追記してください。
        //
        // tag の種類:
        //   "info"        → お知らせ（青）
        //   "event"       → イベント（黄）
        //   "update"      → アップデート（緑）
        //   "maintenance" → メンテナンス（赤）
        // ============================================================
        const newsData = [
            {
                date: "2026-03-05",
                tag: "info",
                title: "新井鯖 公式Webサイトを公開しました",
                body: "新井鯖の公式Webサイトを公開しました。\n\nMembers ページではサーバー内の国家・メンバー情報を確認できます。\nRules ページではサーバールールを確認できます。\nAdmin ページでは運営チームのメンバーを確認できます。\n\n今後も随時情報を更新していきますので、よろしくお願いします。"
            },
        ];

        // ── タグ設定 ──
        const tagConfig = {
            info:        { label: "お知らせ",     cls: "tag-info" },
            event:       { label: "イベント",     cls: "tag-event" },
            update:      { label: "アップデート", cls: "tag-update" },
            maintenance: { label: "メンテナンス", cls: "tag-maintenance" },
        };

        let currentFilter = "all";

        function renderNews(filter = "all", searchTerm = "") {
            const list = document.getElementById("newsList");
            let filtered = filter !== "all"
                ? newsData.filter(n => n.tag === filter)
                : [...newsData];

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(n =>
                    n.title.toLowerCase().includes(term) ||
                    n.body.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="no-results">該当するお知らせが見つかりませんでした。</div>`;
                return;
            }

            list.innerHTML = filtered.map(n => {
                const tag = tagConfig[n.tag] || tagConfig.info;
                return `
                <div class="news-card" onclick="this.classList.toggle('open')">
                    <div class="news-meta">
                        <span class="news-date">${n.date}</span>
                        <span class="news-tag ${tag.cls}">${tag.label}</span>
                    </div>
                    <div class="news-title">${n.title}</div>
                    <div class="news-body-preview">${n.body.replace(/\n/g, ' ')}</div>
                    <div class="news-body-full">${n.body}</div>
                </div>`;
            }).join("");
        }

        document.getElementById("searchInput").addEventListener("input", e => {
            renderNews(currentFilter, e.target.value);
        });

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderNews(currentFilter, document.getElementById("searchInput").value);
            });
        });

        function toggleNav() {
            document.querySelector(".nav-links").classList.toggle("open");
        }

        renderNews();
    </script>
</body>
</html>
