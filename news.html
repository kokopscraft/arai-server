<!DOCTYPE html>
<html lang="ja">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" href="images/server_logo.png" type="image/png">
   <link rel="apple-touch-icon" href="images/server_logo.png">
   <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
   <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
   <title>新井鯖 - News</title>
   <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
     font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
     background-color: #0f172a;
     color: #f1f5f9;
     min-height: 100vh;
    }

    /* ── Navigation ── */
    .site-nav {
     background: rgba(15, 23, 42, 0.97);
     backdrop-filter: blur(10px);
     border-bottom: 1px solid #334155;
     position: sticky;
     font-family: 'Noto Sans JP', sans-serif;
     top: 0;
     z-index: 100;
    }
    .nav-inner {
     max-width: 1200px;
     margin: 0 auto;
     display: flex;
     align-items: center;
     justify-content: space-between;
     padding: 0.75rem 2rem;
    }
    .nav-logo-link {
     display: flex;
     align-items: center;
     gap: 0.75rem;
     text-decoration: none;
     color: #f1f5f9;
    }
    .nav-logo {
     width: 40px;
     height: 40px;
     border-radius: 8px;
     object-fit: cover;
    }
    .nav-title {
     font-size: 1.2rem;
     font-weight: 900;
     color: #38bdf8;
     letter-spacing: 0.02em;
    }
    .nav-links {
     list-style: none;
     display: flex;
     gap: 0.25rem;
    }
    .nav-links a {
     display: block;
     padding: 0.5rem 1rem;
     color: #cbd5e1;
     text-decoration: none;
     border-radius: 6px;
     font-size: 0.9rem;
     font-weight: 500;
     border: 1px solid transparent;
     transition: all 0.2s;
    }
    .nav-links a:hover {
     background: #1e293b;
     color: #38bdf8;
     border-color: #334155;
    }
    .nav-links a.active {
     background: rgba(56, 189, 248, 0.15);
     color: #38bdf8;
     border: 1px solid rgba(56, 189, 248, 0.3);
    }

    /* ── Container ── */
    .container {
     max-width: 900px;
     margin: 0 auto;
     padding: 3rem 2rem 0;
    }

    /* ── Page Header ── */
    header {
     text-align: center;
     margin-bottom: 2.5rem;
     padding-bottom: 2rem;
     border-bottom: 1px solid #334155;
    }
    h1 {
     font-size: 2.5rem;
     font-weight: 800;
     letter-spacing: -0.02em;
     margin-bottom: 0.5rem;
     color: #f1f5f9;
    }
    .subtitle {
     color: #94a3b8;
     font-size: 1rem;
    }

    /* ── Search ── */
    .search-box {
     margin-bottom: 2rem;
     display: flex;
     gap: 1rem;
     flex-wrap: wrap;
     align-items: center;
    }
    .search-input {
     flex: 1;
     min-width: 220px;
     padding: 0.75rem 1rem;
     background: #1e293b;
     border: 1px solid #334155;
     border-radius: 8px;
     color: #f1f5f9;
     font-size: 1rem;
     transition: all 0.2s;
    }
    .search-input:focus {
     outline: none;
     border-color: #38bdf8;
     box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
    }
    .filter-buttons {
     display: flex;
     gap: 0.5rem;
     flex-wrap: wrap;
    }
    .filter-btn {
     padding: 0.5rem 1rem;
     background: #1e293b;
     border: 1px solid #334155;
     border-radius: 6px;
     color: #94a3b8;
     cursor: pointer;
     transition: all 0.2s;
     font-size: 0.875rem;
    }
    .filter-btn:hover {
     border-color: #38bdf8;
     color: #38bdf8;
    }
    .filter-btn.active {
     background: rgba(56, 189, 248, 0.15);
     color: #38bdf8;
     border-color: rgba(56, 189, 248, 0.3);
    }

    /* ── News Cards ── */
    .news-list {
     display: flex;
     flex-direction: column;
     gap: 1.25rem;
     margin-bottom: 4rem;
    }
    .news-card {
     background: #1e293b;
     border: 1px solid #334155;
     border-radius: 16px;
     padding: 1.5rem 2rem;
     cursor: pointer;
     position: relative;
     overflow: hidden;
    }
    .news-card::before {
     content: '';
     position: absolute;
     left: 0;
     top: 0;
     bottom: 0;
     width: 4px;
     background: #334155;
     transition: background 0.2s;
    }
    .news-card:hover {
     border-color: #38bdf8;
     box-shadow: 0 8px 32px rgba(56, 189, 248, 0.1);
    }
    .news-card:hover::before {
     background: #38bdf8;
    }
    .news-meta {
     display: flex;
     align-items: center;
     gap: 0.75rem;
     margin-bottom: 0.75rem;
     flex-wrap: wrap;
    }
    .news-date {
     font-size: 0.8rem;
     color: #64748b;
     font-family: 'Courier New', monospace;
    }
    .news-tag {
     font-size: 0.72rem;
     font-weight: 600;
     padding: 0.2rem 0.65rem;
     border-radius: 4px;
     display: inline-block;
    }
    .tag-info   { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
    .tag-event   { background: rgba(234, 179, 8, 0.15);  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }
    .tag-update  { background: rgba(34, 197, 94, 0.15);  color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
    .tag-maintenance { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .news-title {
     font-size: 1.1rem;
     font-weight: 700;
     color: #f1f5f9;
     margin-bottom: 0.5rem;
     line-height: 1.5;
    }
    .news-body-preview {
     font-size: 0.9rem;
     color: #94a3b8;
     line-height: 1.7;
     display: -webkit-box;
     -webkit-line-clamp: 2;
     line-clamp: 2;
     -webkit-box-orient: vertical;
     overflow: hidden;
    }
    .news-body-full {
     max-height: 0;
     overflow: hidden;
     transition: max-height 0.3s ease-out, padding 0.3s ease;
     font-size: 0.9rem;
     color: #cbd5e1;
     line-height: 1.8;
     border-top: 0 solid #334155;
     margin-top: 0;
     white-space: pre-wrap;
    }
    .news-card.open .news-body-preview {
     display: none;
    }
    .news-card.open .news-body-full {
     max-height: 600px;
     padding-top: 0.75rem;
     margin-top: 0.75rem;
     border-top-width: 1px;
    }
    .news-card.open {
     border-color: #38bdf8;
    }
    .news-card.open::before {
     background: #38bdf8;
    }

    /* 検索結果なし */
    .no-results {
     text-align: center;
     padding: 3rem;
     color: #94a3b8;
    }

    /* ── Footer ── */
    footer {
     text-align: center;
     padding: 2.5rem 2rem 2rem;
     color: #475569;
     font-size: 0.8rem;
     border-top: 1px solid #1e293b;
     margin-top: 4rem;
    }
    .footer-social {
     display: flex;
     justify-content: center;
     gap: 1.25rem;
     margin-bottom: 1.25rem;
     flex-wrap: wrap;
    }
    .footer-social a {
     display: flex;
     align-items: center;
     gap: 0.5rem;
     color: #94a3b8;
     text-decoration: none;
     font-size: 0.85rem;
     font-weight: 500;
     padding: 0.45rem 1rem;
     border-radius: 20px;
     border: 1px solid #334155;
     transition: all 0.3s ease;
    }
    .footer-social a:hover {
     color: #f1f5f9;
     border-color: #38bdf8;
     background: rgba(56, 189, 248, 0.08);
    }
    .footer-social img {
     width: 18px;
     height: 18px;
     object-fit: contain;
     transform: scale(1.05);
    }
    .footer-social a[href*="x.com"] img {
     transform: scale(0.88);
    }
    footer p {
     margin-bottom: 0.25rem;
    }

    /* ── Hamburger ── */
    .nav-hamburger {
     display: none;
     flex-direction: column;
     gap: 5px;
     background: none;
     border: none;
     cursor: pointer;
     padding: 0.5rem;
    }
    .nav-hamburger span {
     display: block;
     width: 24px;
     height: 2px;
     background: #f1f5f9;
     border-radius: 2px;
    }
    .nav-hamburger span {
      transition: all 0.3s ease;
    }
    .nav-hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .nav-hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .nav-hamburger.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }
    .nav-badge {
      display: inline-block;
      background: #ef4444;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 999px;
      margin-left: 0.3rem;
      vertical-align: middle;
      line-height: 1.4;
    }
    /* ページトップへ戻るボタン */
    #back-to-top {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        width: 44px;
        height: 44px;
        background: rgba(56, 189, 248, 0.15);
        border: 1px solid rgba(56, 189, 248, 0.4);
        border-radius: 50%;
        color: #38bdf8;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.3s, background 0.2s;
        z-index: 200;
    }
    #back-to-top.visible {
        opacity: 1;
        pointer-events: auto;
    }
    #back-to-top:hover {
        background: rgba(56, 189, 248, 0.3);
        transform: translateY(-3px);
    }
    .back-to-top-icon {
        width: 1.25rem;
        height: 1.25rem;
        stroke-width: 2;
        color: #38bdf8;
    }
    mark {
        background: rgba(56, 189, 248, 0.3);
        color: #f1f5f9;
        border-radius: 2px;
        padding: 0 2px;
    }
    /* カードのフェードイン */
    .news-card {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .news-card.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
     .container { padding: 2rem 1rem 0; }
     h1 { font-size: 2rem; }
     .nav-inner { padding: 0.75rem 1rem; position: relative; }
     .news-card { padding: 1.25rem 1.25rem 1.25rem 1.5rem; }
     .search-box { flex-direction: column; }
     .search-input { width: 100%; }
     .nav-hamburger { display: flex; }
     .nav-links {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.97);
      border-bottom: 1px solid #334155;
      padding: 0.5rem 1rem 1rem;
      z-index: 99;
     }
     .nav-links.open { display: flex; }
    }
    .nav-title-pc {
        display: none; /* モバイルでは非表示 */
    }
    @media (min-width: 641px) {
        .nav-title-pc {
            display: inline; /* PC幅では表示 */
        }
    }
   </style>
</head>

   <script>
    function highlight(text, term) {
        if (!term) return text;
        const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(escaped, 'gi'), match => `<mark>${match}</mark>`);
    }

    // ── タグ設定 ──
    const tagConfig = {
     info:    { label: "お知らせ",  cls: "tag-info" },
     event:    { label: "イベント",  cls: "tag-event" },
     update:   { label: "アップデート", cls: "tag-update" },
     maintenance: { label: "メンテナンス", cls: "tag-maintenance" },
    };

    let currentFilter = "all";

    function renderNews(filter = "all", searchTerm = "") {
     const list = document.getElementById("newsList");
     let filtered = filter !== "all"
      ? newsData.filter(n => n.tag === filter)
      : [...newsData];

     if (searchTerm) {
      const term = searchTerm.toLowerCase();
      filtered = filtered.filter(n =>
         n.title.toLowerCase().includes(term) ||
         n.body.toLowerCase().includes(term)
      );
     }

     if (filtered.length === 0) {
      list.innerHTML = `<div class="no-results">該当するお知らせが見つかりませんでした。</div>`;
      return;
     }

     list.innerHTML = filtered.map(n => {
      const tag = tagConfig[n.tag] || tagConfig.info;
      return `
      <div class="news-card" onclick="this.classList.toggle('open')">
         <div class="news-meta">
          <span class="news-date">${n.date}</span>
          <span class="news-tag ${tag.cls}">${tag.label}</span>
         </div>
         <div class="news-title">${highlight(n.title, searchTerm)}</div>
         <div class="news-body-preview">${highlight(n.body.replace(/\n/g, ' '), searchTerm)}</div>
         <div class="news-body-full">${highlight(n.body, searchTerm)}</div>
      </div>`;
     }).join("");
     observeCards();
    }

    document.getElementById("searchInput").addEventListener("input", e => {
     renderNews(currentFilter, e.target.value);
    });

    document.querySelectorAll(".filter-btn").forEach(btn => {
     btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderNews(currentFilter, document.getElementById("searchInput").value);
     });
    });

    function toggleNav() {
      document.querySelector('.nav-links').classList.toggle('open');
      document.querySelector('.nav-hamburger').classList.toggle('open'); // ← 追加
    }

    function observeCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, i * 80); // カードごとに80msずつ遅延
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
      
        document.querySelectorAll('.news-card').forEach(card => {
            observer.observe(card);
        });
    }

    localStorage.setItem("araiserver_newsLastVisit", Date.now());
    localStorage.setItem("araiserver_newsLatest", newsData[0].date);
    
    renderNews();
    lucide.createIcons();

    // ページトップへ戻るボタン

        backToTop.classList.toggle('visible', window.scrollY > 300);
    });
    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
   </script>
</body>
</html>
